name: Deploy to GitHub Pages

on:
  # Run on every push to the main branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required by GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        # Reads your repo's Pages settings and outputs the correct base path:
        #   - no custom domain  -> origin=https://<user>.github.io, base_path=/globaledgeservice
        #   - custom domain set -> origin=https://globaledgeservice.com, base_path=/
        id: pages
        uses: actions/configure-pages@v5
      - name: Build Astro site
        uses: withastro/action@v4
        # astro.config.mjs reads SITE/BASE from env, so the build automatically
        # targets whichever URL GitHub Pages is serving — no code changes at cutover.
        env:
          SITE: ${{ steps.pages.outputs.origin }}
          BASE: ${{ steps.pages.outputs.base_path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
